<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Data Siswa</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:25px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#3498db;
color:white;
}

button{
padding:8px 14px;
background:#e74c3c;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#c0392b;
}

</style>

</head>

<body>

<div class="header">
Admin Panel Sistem Ujian
</div>

<div class="container">

<h2>Data Siswa Terdaftar</h2>

<table>

<thead>
<tr>
<th>Nama</th>
<th>Kelas</th>
<th>Email</th>
<th>No HP</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="dataSiswa"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAMgyNIas-WYNuSaBWRu3QbxfUCh_qCx88",
authDomain: "ujian-sekolah-c6518.firebaseapp.com",
databaseURL: "https://ujian-sekolah-c6518-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ujian-sekolah-c6518",
storageBucket: "ujian-sekolah-c6518.firebasestorage.app",
messagingSenderId: "535101073111",
appId: "1:535101073111:web:d6d8ef4dd147ecc63e7292"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("dataSiswa");

const siswaRef = ref(db,"siswa");

onValue(siswaRef,(snapshot)=>{

table.innerHTML="";

snapshot.forEach((child)=>{

const data = child.val();
const uid = child.key;

const row = `
<tr>
<td>${data.nama}</td>
<td>${data.kelas}</td>
<td>${data.email}</td>
<td>${data.phone}</td>
<td>
<button onclick="hapusSiswa('${uid}')">Hapus</button>
</td>
</tr>
`;

table.innerHTML += row;

});

});

window.hapusSiswa = function(uid){

if(confirm("Yakin ingin menghapus siswa ini?")){

remove(ref(db,"siswa/"+uid));

alert("Data siswa dihapus");

}

}

</script>

</body>
</html>
