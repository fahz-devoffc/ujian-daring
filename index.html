<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Registrasi Siswa</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
width:400px;
margin:60px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:12px;
background:#3498db;
border:none;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

#qrBox{
text-align:center;
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<div class="header">
Sistem Ujian Sekolah
</div>

<div class="container">

<h2>Registrasi Siswa/i</h2>

<form id="registerForm">

<label>Nama</label>
<input type="text" id="nama" required>

<label>Kelas</label>
<input type="text" id="kelas" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Nomor Telepon</label>
<input type="text" id="phone" required>

<button type="submit">Daftar</button>

</form>

<div id="qrBox">
<h3>QR Login Anda</h3>
<canvas id="qrcode"></canvas>
<p>Simpan QR ini untuk login</p>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAMgyNIas-WYNuSaBWRu3QbxfUCh_qCx88",
authDomain: "ujian-sekolah-c6518.firebaseapp.com",
databaseURL: "https://ujian-sekolah-c6518-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ujian-sekolah-c6518",
storageBucket: "ujian-sekolah-c6518.firebasestorage.app",
messagingSenderId: "535101073111",
appId: "1:535101073111:web:d6d8ef4dd147ecc63e7292"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const form = document.getElementById("registerForm");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const nama=document.getElementById("nama").value;
const kelas=document.getElementById("kelas").value;
const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;

const password=phone;

try{

const userCredential=await createUserWithEmailAndPassword(auth,email,password);
const user=userCredential.user;
const uid=user.uid;

await set(ref(db,"siswa/"+uid),{
nama:nama,
kelas:kelas,
email:email,
phone:phone,
uid:uid
});

document.getElementById("qrBox").style.display="block";

QRCode.toCanvas(document.getElementById("qrcode"),uid);

alert("Registrasi berhasil!");

}catch(err){

alert(err.message);

}

});

</script>

</body>
</html>
